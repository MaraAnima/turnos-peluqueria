<!doctype html>
<html lang="es">
  <head>
    <style>
      body {
        margin: 0;

        padding: 0;

        background-size: cover;
      }
      .turnos {
        width: 95%;
      }
      .turnos-card {
        padding: 20px;
        width: 100%;
        max-width: 500px;
        aspect-ratio: 1 / 1;
        margin: 20px auto;
        background: #dff6f7;
        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .turnos-title {
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: #1f6f73;
        margin-bottom: 5%;
      }
      .turnos-subtitle {
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: #1f6f73;
      }
      body {
        font-family: "Segoe UI", "Roboto", sans-serif;
        line-height: 1.5;
      }
      .turnos-title {
        font-size: 22px;
        letter-spacing: 0.5px;
      }
      .turnos-subtitle {
        font-size: 16px;
        margin-top: 10px;
      }

      .turnos-input,
      .turnos-select {
        padding: 10px;
        margin: 4px 0;
        border-radius: 10px;
        border: 2px solid #ffffff;
        outline: none;
        transition: border-color 0.3s;
        color: #1f6f73;
      }
      .turnos-input:focus {
        border-color: #43c7cd;
      }
      .card {
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }
      .card:hover {
        transform: translateY(-3px);
      }

      .turnos-horarios {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
        margin: 8px 0;
      }

      .turno-btn {
        padding: 8px 12px;
        border-radius: 20px;
        border: none;
        background: #ffffff;
        cursor: pointer;
        font-weight: bold;
      }

      .turno-btn.selected {
        background: #43c7cd;
        color: white;
      }

      .turno-btn.disabled {
        background: #eee;
        color: #999;
        text-decoration: line-through;
        cursor: not-allowed;
      }

      .turnos-btn {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        color: white;
      }
      .turnos-btn {
        background: #1f6f73;
        transition:
          background 0.3s,
          transform 0.2s;
      }
      .turnos-btn:hover {
        background: #43c7cd;
        transform: scale(1.03);
      }

      .turnos-msg {
        text-align: center;
        font-size: 13px;
      }
      .cards-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin: 10px 0;
      }

      .card {
        flex: 1;
        background: #ffffff;
        border-radius: 14px;
        padding: 10px;
        text-align: center;
        cursor: pointer;
        transition: 0.2s;
        border: 2px solid transparent;
      }

      .card img {
        width: 100%;
        max-height: 70px;
        object-fit: contain;
        transition: transform 0.2s;
      }

      .card span {
        display: block;
        margin-top: 5px;
        font-weight: bold;
        font-size: 12px;
      }

      .card:hover img {
        transform: scale(1.1);
      }

      .card.selected {
        background: #e0fcfd;
        border: 2px solid #43c7cd;
        color: #1f6f73;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: #dff6f7;
        padding: 20px;
        border-radius: 16px;
        text-align: center;
        width: 80%;
        max-width: 300px;
        color: #1f6f73;
        font-weight: bold;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        animation: fadeIn 0.3s ease;
      }

      #modal-close {
        position: absolute;
        top: 10px;
        right: 20px;
        cursor: pointer;
        font-size: 20px;
      }

      @keyframes fadeIn {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
    <meta charset="UTF-8" />
    <title>Turnos</title>
  </head>
  <body style="margin: 0">
    <div id="app-turnos"></div>
    <script src="turnos.js"></script>
  </body>
</html>
