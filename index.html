<!doctype html>
<html lang="es">
  <head>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background-image: url("Fondo.png");
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .turnos {
        width: 95%;
      }
      .turnos-card {
        padding: 10%;
        width: 100%;
        aspect-ratio: 1 / 1;
        margin-top: 10%;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .turnos-title {
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: #1f6f73;
        margin-bottom: 5%;
      }
      .turnos-subtitle {
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: #1f6f73;
      }

      .turnos-input,
      .turnos-select {
        padding: 10px;
        margin: 4px 0;
        border-radius: 10px;
        border: 1px solid #ddd;
      }

      .turnos-horarios {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
        margin: 8px 0;
      }

      .turno-btn {
        padding: 8px 12px;
        border-radius: 20px;
        border: none;
        background: #f1f1f1;
        cursor: pointer;
        font-weight: bold;
      }

      .turno-btn.selected {
        background: #43c7cd;
        color: white;
      }

      .turno-btn.disabled {
        background: #eee;
        color: #999;
        text-decoration: line-through;
        cursor: not-allowed;
      }

      .turnos-btn {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        background: #f9be3d;
        font-weight: bold;
        cursor: pointer;
        color: white;
      }

      .turnos-msg {
        text-align: center;
        font-size: 13px;
      }
      .cards-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin: 10px 0;
      }

      .card {
        flex: 1;
        background: #f1f1f1;
        border-radius: 14px;
        padding: 10px;
        text-align: center;
        cursor: pointer;
        transition: 0.2s;
        border: 2px solid transparent;
      }

      .card img {
        width: 100%;
        max-height: 70px;
        object-fit: contain;
        transition: transform 0.2s;
      }

      .card span {
        display: block;
        margin-top: 5px;
        font-weight: bold;
        font-size: 12px;
      }

      .card:hover img {
        transform: scale(1.1);
      }

      .card.selected {
        background: #dff6f7;
        border: 2px solid #1f6f73;
      }
    </style>
    <meta charset="UTF-8" />
    <title>Turnos</title>
  </head>
  <body style="margin: 0">
    <div id="app-turnos"></div>
    <script src="turnos.js"></script>
  </body>
</html>
